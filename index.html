<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/style.css" />
  <script src="js/app.js" defer></script>
  <title>Um pedido especial 💕</title>
</head>
<body>

  <div id="particles" aria-hidden="true"></div>

  <!-- TELA 1 — PERGUNTA -->
  <section id="tela-pergunta">
    <img src="imgs/rosa.png" alt="Emoji com uma rosa na boca" class="emoji-topo" />
    <h1 class="pergunta">Você quer <span>sair</span> comigo?</h1>
    <p class="subtitulo">uma proposta muito séria 💌</p>
    <div class="botoes-wrapper">
      <button id="btn-sim" class="btn-sim">Sim 💖</button>
      <button id="btn-nao" class="btn-nao">Não</button>
    </div>
    <p id="msg-deboche" aria-live="polite"></p>
  </section>

  <!-- TELA 2 — AGENDAMENTO (exibida via JS, sem novo .html) -->
  <section id="tela-encontro">
    <img src="imgs/questionando.png" alt="Emoji pensativo" class="emoji-topo-2" />
    <div class="card-encontro">
      <h2 class="card-titulo">Quando a gente se <span>encontra?</span></h2>
      <div class="campo-grupo">
        <label for="campo-data">📅 Data</label>
        <input type="date" id="campo-data" name="data" />
      </div>
      <div class="campo-grupo">
        <label for="campo-hora">⏰ Horário</label>
        <input type="time" id="campo-hora" name="hora" />
      </div>
      <button id="btn-marcar" class="btn-marcar">Marcar encontro 🌹</button>
    </div>
  </section>

  <!-- TELA 3 — CONFIRMAÇÃO (exibida via JS após marcar) -->
  <section id="tela-confirmacao">
    <div class="confirmacao-icon">🎉</div>
    <h2 class="confirmacao-titulo">Encontro marcado!</h2>
    <p class="confirmacao-detalhe">
      📅 <strong id="confirmacao-data"></strong><br />
      ⏰ <strong id="confirmacao-hora"></strong>
    </p>
    <button id="btn-whatsapp" class="link-whatsapp">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path
          d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z" />
        <path
          d="M12 0C5.373 0 0 5.373 0 12c0 2.094.534 4.063 1.47 5.777L.057 23.882l6.264-1.645A11.934 11.934 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818a9.8 9.8 0 01-5.032-1.385l-.36-.214-3.733.98.998-3.641-.235-.373A9.79 9.79 0 012.182 12C2.182 6.57 6.57 2.182 12 2.182S21.818 6.57 21.818 12 17.43 21.818 12 21.818z" />
      </svg>
      Avisar pelo WhatsApp
    </button>
  </section>
</body>
</html>
