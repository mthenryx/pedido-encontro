<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>💌 Um Convite Especial</title>
  <link rel="stylesheet" href="style.css" />
  <script src="app.js" defer></script>
</head>
<body>

  <!-- Fundo com corações flutuantes -->
  <div id="hearts-bg"></div>

  <!-- Canvas de confete (ativado ao confirmar) -->
  <canvas class="confetti-canvas" id="confetti-canvas"></canvas>

  <!-- Card principal (aparência de app) -->
  <div id="app">

    <!-- TELA 1: O Convite -->
    <div class="screen active" id="screen-invite">
      <div class="dots">
        <div class="dot active"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
      <div class="emoji-big">🥺</div>
      <p class="title">Pensa bem...</p>
      <p class="subtitle">Você aceitaria ir a um<br><strong>date</strong> comigo?</p>
      <p class="fun-msg" id="fun-msg">&nbsp;</p>
      <div class="btn-row" id="btn-row">
        <button class="btn btn-yes" id="btn-yes" onclick="goToVibe()">SIM 💕</button>
        <button class="btn btn-no"  id="btn-no">NÃO!!!</button>
      </div>
    </div>

    <!-- TELA 2: Escolha de Vibe -->
    <div class="screen" id="screen-vibe">
      <div class="dots">
        <div class="dot"></div>
        <div class="dot active"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
      <div class="emoji-big">🎉</div>
      <p class="title">Que bom! ❤️</p>
      <p class="subtitle">Qual vibe você prefere?</p>
      <div class="vibes-grid" id="vibes-grid">
        <!-- Cards injetados pelo JavaScript -->
      </div>
      <button class="btn-full" id="btn-vibe-next" disabled onclick="goToDate()">Próximo →</button>
    </div>

    <!-- TELA 3: Escolha de Data -->
    <div class="screen" id="screen-date">
      <div class="dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot active"></div>
        <div class="dot"></div>
      </div>
      <div class="emoji-big">📅</div>
      <p class="title">Agora escolha uma data ❤️</p>
      <div class="date-wrap">
        <div>
          <div class="field-label">Dia</div>
          <input class="styled-input" type="date" id="pick-date" />
        </div>
        <div>
          <div class="field-label">Horário</div>
          <input class="styled-input" type="time" id="pick-time" value="19:00" />
        </div>
      </div>
      <button class="btn-full" onclick="goToSummary()">Ver Resumo →</button>
    </div>

    <!-- TELA 4: Resumo -->
    <div class="screen" id="screen-summary">
      <div class="dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot active"></div>
      </div>
      <div class="emoji-big">✨</div>
      <p class="title">Perfeito! Nosso date<br>está marcado ❤️</p>
      <div class="summary-box">
        <div class="summary-row">
          <span class="icon" id="sum-vibe-icon">🍔</span>
          <span><strong>Vibe:</strong> <span id="sum-vibe-name">—</span></span>
        </div>
        <div class="summary-row">
          <span class="icon">📅</span>
          <span><strong>Data:</strong> <span id="sum-date">—</span></span>
        </div>
        <div class="summary-row">
          <span class="icon">🕐</span>
          <span><strong>Horário:</strong> <span id="sum-time">—</span></span>
        </div>
      </div>
      <button class="btn-full" onclick="celebrate()">Confirmar 🎊</button>
    </div>

    <!-- TELA 5: Celebração -->
    <div class="screen" id="screen-celebrate">
      <div class="celebrate-emoji">❤️</div>
      <p class="celebrate-title">Mal posso esperar<br>pelo nosso date ❤️</p>
      <p class="subtitle" style="margin-top:4px;">Vai ser incrível! 🌟</p>
    </div>

  </div><!-- /#app -->

  <script src="script.js"></script>
</body>
</html>
